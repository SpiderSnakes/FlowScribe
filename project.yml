name: FlowScribe
options:
  bundleIdPrefix: cloud.spidersnake
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "2"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application"
    DEVELOPMENT_TEAM: "Y8XLVL2758"
    ARCHS: arm64
  configs:
    # En Release (distribution), ne PAS injecter l'entitlement de débogage « get-task-allow » :
    # Apple refuse la notarisation si l'exécutable le demande. (Debug le garde → débogueur OK.)
    Release:
      CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
      OTHER_CODE_SIGN_FLAGS: "--timestamp"
packages:
  FlowScribeCore:
    path: FlowScribeCore
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
targets:
  FlowScribe:
    type: application
    platform: macOS
    sources:
      - path: FlowScribe
    dependencies:
      - package: FlowScribeCore
      - package: KeyboardShortcuts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cloud.spidersnake.FlowScribe
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: FlowScribe/FlowScribe.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSUIElement: NO
    info:
      path: FlowScribe/Info.plist
      properties:
        CFBundleDisplayName: FlowScribe
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - fr
        LSMinimumSystemVersion: "26.0"
        NSMicrophoneUsageDescription: "FlowScribe a besoin du micro pour transcrire votre voix."
        NSSpeechRecognitionUsageDescription: "FlowScribe utilise la reconnaissance vocale locale de macOS pour transcrire vos dictées."
        NSAppleEventsUsageDescription: "FlowScribe met votre musique (Music/Spotify) en pause pendant la dictée."
